# 开发环境配置
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:openclaw_memory}
    username: ${DB_USERNAME:openclaw}
    password: ${DB_PASSWORD:openclaw_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# API 认证（开发环境默认值，生产环境必须通过 API_USERNAME、API_PASSWORD 环境变量配置）
springclaw:
  security:
    username: ${API_USERNAME:springclaw}
    password: ${API_PASSWORD:dev_secret}
